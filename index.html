<!DOCTYPE html>
<html lang="id">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Pomodoro Premium</title>
    <link rel="preconnect" href="https://fonts.googleapis.com">
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
    <link href="https://fonts.googleapis.com/css2?family=Outfit:wght@200;400;500&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="css/style.css">
</head>
<body>
    <div class="glow"></div>
    
    <div class="container">
        <div class="mode-buttons">
            <button class="mode-btn active" data-time="1500">Focus</button>
            <button class="mode-btn" data-time="300">Short Break</button>
            <button class="mode-btn" data-time="900">Long Break</button>
        </div>

        <div class="timer-display" id="display">25:00</div>

        <div class="controls">
            <button id="start-btn" class="primary">Start</button>
            <button id="reset-btn">Reset</button>
        </div>
    </div>

    <script src="js/script.js"></script>
</body>
</html>
